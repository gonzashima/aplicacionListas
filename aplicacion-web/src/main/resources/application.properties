spring.application.name=Listas Web

# PostgreSQL - usa variables de entorno si existen, sino localhost (desarrollo local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/productos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:2520804}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# CORS ? orígenes permitidos separados por coma
# En producción (Render) setear: http://localhost:3000,https://aplicacionlistas-front.onrender.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Deshabilitar Thymeleaf (el frontend es React)
spring.thymeleaf.enabled=false

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Server
server.port=8080

# Logging - ver errores de arranque
logging.level.org.springframework=INFO
logging.level.com.listas=DEBUG
logging.level.org.hibernate.SQL=WARN

