spring.application.name=Listas Web

# MySQL - usa variables de entorno si existen, sino localhost (desarrollo local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/productos?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:2520804}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Deshabilitar Thymeleaf (el frontend es React)
spring.thymeleaf.enabled=false

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Server
server.port=8080

# Logging - ver errores de arranque
logging.level.org.springframework=INFO
logging.level.com.listas=DEBUG
logging.level.org.hibernate.SQL=WARN

