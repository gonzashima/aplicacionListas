<!-- Este archivo no se usa. El frontend es React (carpeta /frontend). -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas - Gestión de Precios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .tabla-productos { font-size: 0.9rem; }
        .tabla-productos th { position: sticky; top: 0; background: #343a40; color: white; z-index: 1; }
        .tabla-container { max-height: 55vh; overflow-y: auto; }
        .selected-row { background-color: #cfe2ff !important; }
        .navbar-brand i { margin-right: 5px; }
        .card { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/"><i class="bi bi-list-columns-reverse"></i> Listas - Gestión de Precios</a>
    </div>
</nav>

<div class="container-fluid px-4">

    <!-- Alertas -->
    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-3">

        <!-- Panel izquierdo: Controles -->
        <div class="col-md-3">

            <!-- Selector de Casa y Lista -->
            <div class="card mb-3">
                <div class="card-header bg-primary text-white">
                    <i class="bi bi-house-door"></i> Seleccionar Lista
                </div>
                <div class="card-body">
                    <form id="formLista" th:action="@{/productos}" method="get">
                        <div class="mb-3">
                            <label for="selectCasa" class="form-label fw-bold">Casa:</label>
                            <select id="selectCasa" class="form-select" onchange="cargarListas()">
                                <option value="">-- Seleccionar --</option>
                                <option th:each="casa : ${casas}"
                                        th:value="${casa.name()}"
                                        th:text="${casa.nombre}"
                                        th:selected="${casaActual != null && casaActual == casa.name()}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="selectLista" class="form-label fw-bold">Lista:</label>
                            <select id="selectLista" name="lista" class="form-select">
                                <option value="">-- Seleccionar --</option>
                                <option th:if="${listasActuales != null}"
                                        th:each="l : ${listasActuales}"
                                        th:value="${l}" th:text="${l}"
                                        th:selected="${listaActual != null && listaActual == l}">
                                </option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-eye"></i> Mostrar
                        </button>
                    </form>
                </div>
            </div>

            <!-- Búsqueda -->
            <div class="card mb-3" th:if="${listaActual != null}">
                <div class="card-header bg-info text-white">
                    <i class="bi bi-search"></i> Buscar Producto
                </div>
                <div class="card-body">
                    <form th:action="@{/productos}" method="get">
                        <input type="hidden" name="lista" th:value="${listaActual}">
                        <div class="mb-3">
                            <input type="text" name="busqueda" class="form-control"
                                   placeholder="Nombre o código"
                                   th:value="${busqueda}">
                        </div>
                        <button type="submit" class="btn btn-info w-100 text-white">
                            <i class="bi bi-search"></i> Buscar
                        </button>
                    </form>
                    <a th:href="@{/productos(lista=${listaActual})}" class="btn btn-outline-secondary w-100 mt-2">
                        <i class="bi bi-arrow-counterclockwise"></i> Mostrar todos
                    </a>
                </div>
            </div>

            <!-- Subir archivo -->
            <div class="card mb-3">
                <div class="card-header bg-success text-white">
                    <i class="bi bi-upload"></i> Leer Archivo
                </div>
                <div class="card-body">
                    <form th:action="@{/archivo/subir}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <input type="file" name="archivo" class="form-control"
                                   accept=".pdf,.xlsx,.xls" required>
                            <div class="form-text">PDF, Excel (.xlsx, .xls)</div>
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-file-earmark-arrow-up"></i> Subir y Procesar
                        </button>
                    </form>
                </div>
            </div>

            <!-- Acciones sobre seleccionados -->
            <div class="card mb-3" th:if="${productos != null && !productos.isEmpty()}">
                <div class="card-header bg-warning">
                    <i class="bi bi-pencil-square"></i> Acciones
                </div>
                <div class="card-body">
                    <!-- Modificar porcentaje -->
                    <form id="formPorcentaje" th:action="@{/productos/porcentaje}" method="post" class="mb-3">
                        <input type="hidden" name="lista" th:value="${listaActual}">
                        <div id="idsPorcentaje"></div>
                        <label class="form-label fw-bold">Nuevo porcentaje:</label>
                        <div class="input-group">
                            <input type="number" name="porcentaje" class="form-control" placeholder="%" required>
                            <button type="submit" class="btn btn-warning" onclick="return prepararIds('formPorcentaje', 'idsPorcentaje')">
                                <i class="bi bi-percent"></i> Aplicar
                            </button>
                        </div>
                    </form>

                    <!-- Modificar costo -->
                    <form id="formCosto" th:action="@{/productos/costo}" method="post" class="mb-3">
                        <input type="hidden" name="lista" th:value="${listaActual}">
                        <div id="idsCosto"></div>
                        <label class="form-label fw-bold">Nuevo costo:</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" name="costo" class="form-control" placeholder="Costo" required>
                            <button type="submit" class="btn btn-warning" onclick="return prepararIds('formCosto', 'idsCosto')">
                                <i class="bi bi-cash"></i> Aplicar
                            </button>
                        </div>
                    </form>

                    <!-- Exportar a Excel -->
                    <div class="d-grid gap-2">
                        <a th:href="@{/productos/excel(lista=${listaActual})}" class="btn btn-outline-success">
                            <i class="bi bi-file-earmark-excel"></i> Exportar a Excel
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel derecho: Tabla de productos -->
        <div class="col-md-9">
            <div class="card">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <span>
                        <i class="bi bi-table"></i>
                        Productos
                        <span th:if="${listaActual != null}"> - <strong th:text="${listaActual}"></strong></span>
                    </span>
                    <span th:if="${productos != null}" class="badge bg-light text-dark"
                          th:text="${#lists.size(productos)} + ' productos'"></span>
                </div>
                <div class="card-body p-0">
                    <div th:if="${productos == null || productos.isEmpty()}" class="text-center p-5 text-muted">
                        <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                        <p class="mt-3">Seleccione una casa y una lista para ver los productos.</p>
                    </div>

                    <div th:if="${productos != null && !productos.isEmpty()}" class="tabla-container">
                        <table class="table table-striped table-hover tabla-productos mb-0">
                            <thead>
                                <tr>
                                    <th><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                                    <th>Código</th>
                                    <th>Nombre</th>
                                    <th>Costo</th>
                                    <th>Costo Desc.</th>
                                    <th>Precio</th>
                                    <th>Porcentaje</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="producto : ${productos}" th:id="'row-' + ${producto.id}">
                                    <td>
                                        <input type="checkbox" class="producto-check"
                                               th:value="${producto.id}"
                                               onclick="toggleRow(this)">
                                    </td>
                                    <td th:text="${producto.codigo}"></td>
                                    <td th:text="${producto.nombre}"></td>
                                    <td th:text="'$' + ${producto.costo}"></td>
                                    <td th:text="'$' + ${producto.costoParcial}"></td>
                                    <td class="fw-bold" th:text="'$' + ${producto.precio}"></td>
                                    <td th:text="${producto.porcentaje} + '%'"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Mapa de casas a listas (se carga del servidor)
    const casasMap = {};
    /*[# th:each="casa : ${casas}"]*/
    /*[/]*/

    // Cargar listas dinámicamente al seleccionar una casa
    function cargarListas() {
        const casa = document.getElementById('selectCasa').value;
        const selectLista = document.getElementById('selectLista');
        selectLista.innerHTML = '<option value="">-- Cargando... --</option>';

        if (!casa) {
            selectLista.innerHTML = '<option value="">-- Seleccionar --</option>';
            return;
        }

        fetch('/api/listas/' + casa)
            .then(response => response.json())
            .then(listas => {
                selectLista.innerHTML = '<option value="">-- Seleccionar --</option>';
                listas.forEach(lista => {
                    const option = document.createElement('option');
                    option.value = lista;
                    option.textContent = lista;
                    selectLista.appendChild(option);
                });
            })
            .catch(() => {
                selectLista.innerHTML = '<option value="">Error al cargar</option>';
            });
    }

    // Seleccionar/deseleccionar todas las filas
    function toggleAll(checkbox) {
        document.querySelectorAll('.producto-check').forEach(cb => {
            cb.checked = checkbox.checked;
            toggleRow(cb);
        });
    }

    // Resaltar fila seleccionada
    function toggleRow(checkbox) {
        const row = checkbox.closest('tr');
        if (checkbox.checked) {
            row.classList.add('selected-row');
        } else {
            row.classList.remove('selected-row');
        }
    }

    // Preparar IDs seleccionados antes de enviar formulario
    function prepararIds(formId, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';

        const checkeados = document.querySelectorAll('.producto-check:checked');
        if (checkeados.length === 0) {
            alert('Seleccione al menos un producto.');
            return false;
        }

        checkeados.forEach(cb => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'ids';
            input.value = cb.value;
            container.appendChild(input);
        });

        return true;
    }
</script>

</body>
</html>
