services:

  # ── Base de datos MySQL ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: listas-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 2520804
      MYSQL_DATABASE: productos
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p2520804"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Spring Boot ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: aplicacion-web/Dockerfile
    container_name: listas-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/productos?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 2520804
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend React (nginx) ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: listas-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:

